name: Publish on tag

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v2.1.0)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Resolve tag
        id: tag
        env:
          REF: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${INPUT_TAG:-$REF}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match vMAJOR.MINOR.PATCH."
            exit 1
          fi
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"     >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          tool_versions: |
            node 22

      - name: Use latest npm (Trusted Publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Quality gate
        run: |
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Verify package.json matches tag
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PKG=$(node -p "require('./package.json').version")
          if [[ "$PKG" != "$VERSION" ]]; then
            echo "::error::Tag is $VERSION but package.json is $PKG."
            exit 1
          fi

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
